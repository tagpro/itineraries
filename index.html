<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Itineraries</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class', // Allow manual or system dark mode
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Apple-like scrollbar for sidebar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Active state for sidebar links */
        .nav-item.active {
            background-color: #e2e8f0;
            color: #0f172a;
            font-weight: 600;
        }
        
        @media (prefers-color-scheme: dark) {
            .nav-item.active {
                background-color: #334155;
                color: #f8fafc;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen w-screen overflow-hidden flex font-sans antialiased dark:bg-slate-900 dark:text-slate-100">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-transition w-64 md:w-72 bg-slate-100/90 dark:bg-slate-800/90 backdrop-blur-2xl border-r border-slate-200 dark:border-slate-700 flex flex-col h-full absolute md:relative z-20 shrink-0">
        <!-- Sidebar Header -->
        <div class="h-14 flex items-center px-4 justify-between">
            <div class="font-bold text-sm text-slate-500 dark:text-slate-400 uppercase tracking-wider flex items-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path></svg>
                <span>Itineraries</span>
            </div>
            <!-- Mobile close button -->
            <button onclick="toggleSidebar()" class="md:hidden p-1.5 rounded-md hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Sidebar Content -->
        <div class="flex-1 overflow-y-auto p-3 space-y-1">
            <!-- Year Group -->
            <div class="mb-4">
                <h3 class="px-3 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 mt-2">2026</h3>
                <button onclick="loadItinerary('./tassie-2026/index.html', this)" class="nav-item active w-full flex items-center px-3 py-2 text-sm rounded-lg text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-left group">
                    <span class="mr-3 text-lg group-hover:scale-110 transition-transform">🌲</span>
                    <span class="truncate">Tasmania Explorer</span>
                </button>
            </div>
            
            <!-- Year Group -->
            <div class="mb-4">
                <h3 class="px-3 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 mt-4">Future Trips</h3>
                <button onclick="loadItinerary('about:blank', this)" class="nav-item w-full flex items-center px-3 py-2 text-sm rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-left group">
                    <span class="mr-3 text-lg opacity-50 group-hover:scale-110 transition-transform">✈️</span>
                    <span class="truncate">Add new...</span>
                </button>
            </div>
        </div>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-slate-200/50 dark:border-slate-700/50">
            <p class="text-xs text-slate-400 dark:text-slate-500 text-center font-medium">Tagpro Trips</p>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-10 md:hidden transition-opacity"></div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 bg-white dark:bg-[#fafaf9] relative z-0">
        <!-- Topbar / Titlebar -->
        <header class="h-14 border-b border-slate-200 dark:border-stone-200 flex items-center px-4 bg-white/90 dark:bg-[#fafaf9]/90 backdrop-blur-md absolute top-0 w-full z-10 shrink-0">
            <button onclick="toggleSidebar()" class="p-1.5 mr-3 rounded-md hover:bg-slate-100 dark:hover:bg-stone-200 text-slate-600 dark:text-stone-600 transition-colors" aria-label="Toggle Sidebar">
                <!-- Apple style sidebar icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-width="2"></rect>
                    <path d="M9 3v18" stroke-width="2"></path>
                </svg>
            </button>
            <h1 id="topbar-title" class="font-semibold text-slate-800 dark:text-stone-800 text-sm">Tasmania Explorer</h1>
        </header>

        <!-- Iframe Container -->
        <div class="flex-1 w-full h-full pt-14 bg-[#fafaf9] dark:bg-[#fafaf9]">
            <!-- The iframe loads the actual itinerary page -->
            <iframe id="content-frame" src="./tassie-2026/index.html" class="w-full h-full border-none" title="Itinerary Content"></iframe>
            
            <!-- Blank State (hidden by default) -->
            <div id="blank-state" class="hidden w-full h-full flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 text-slate-400">
                <span class="text-6xl mb-4 opacity-50">🗺️</span>
                <p class="text-lg font-medium text-slate-500">Select an itinerary from the sidebar</p>
            </div>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const iframe = document.getElementById('content-frame');
        const blankState = document.getElementById('blank-state');
        const topbarTitle = document.getElementById('topbar-title');
        
        let sidebarOpen = true;

        // Auto-close sidebar on mobile initially
        function initLayout() {
            if (window.innerWidth < 768) {
                sidebar.style.transform = 'translateX(-100%)';
                overlay.classList.add('hidden');
                sidebarOpen = false;
            } else {
                sidebar.style.transform = 'translateX(0)';
                sidebar.style.marginLeft = '0';
                overlay.classList.add('hidden');
                sidebarOpen = true;
            }
        }
        
        // Run on load
        initLayout();

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            
            if (window.innerWidth < 768) {
                // Mobile behavior: Slide over with overlay
                if (sidebarOpen) {
                    sidebar.style.transform = 'translateX(0)';
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.style.transform = 'translateX(-100%)';
                    overlay.classList.add('hidden');
                }
            } else {
                // Desktop behavior: Push content
                if (sidebarOpen) {
                    sidebar.style.transform = 'translateX(0)';
                    sidebar.style.marginLeft = '0';
                } else {
                    sidebar.style.transform = 'translateX(0)'; // Keep transform 0
                    sidebar.style.marginLeft = `-${sidebar.offsetWidth}px`; // Use negative margin to collapse
                }
            }
        }

        function loadItinerary(url, btnElement) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // Update title
            if(btnElement) {
                const title = btnElement.querySelector('span.truncate').innerText;
                topbarTitle.innerText = title;
            }

            // Load content
            if (url === 'about:blank') {
                iframe.classList.add('hidden');
                blankState.classList.remove('hidden');
            } else {
                iframe.classList.remove('hidden');
                blankState.classList.add('hidden');
                iframe.src = url;
            }

            // Auto-close on mobile after selection
            if (window.innerWidth < 768 && sidebarOpen) {
                toggleSidebar();
            }
        }
    </script>
</body>
</html>
